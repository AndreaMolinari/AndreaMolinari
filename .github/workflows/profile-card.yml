name: Profile card
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["custom-card"] }

permissions:
  contents: write

jobs:
  profile-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate profile-card.svg
        run: node scripts/generate-card.ts
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-card.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update profile-card.svg - [Skip GitHub Action]"
          git push
